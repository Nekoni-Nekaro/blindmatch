version: '3.9'

services:
  # ─── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: blindmatch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-blindmatch}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-blindmatch_secret}
      POSTGRES_DB: ${DB_DATABASE:-blindmatch_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-blindmatch}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blindmatch_net

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: blindmatch_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blindmatch_net

  # ─── NestJS Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: blindmatch_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - blindmatch_net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ─── Nginx reverse proxy ───────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: blindmatch_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - blindmatch_net

  # ─── Adminer (dev only) ────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: blindmatch_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    networks:
      - blindmatch_net
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:

networks:
  blindmatch_net:
    driver: bridge
